<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whack-A-Pol — Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#ccc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:24px;width:100%;max-width:500px;margin-bottom:16px}
h1{font-size:1.5rem;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#ff4444,#44aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:0.75rem;color:#666688;margin-bottom:20px}
.stat-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.stat-label{color:#8888bb;font-size:0.9rem}
.stat-value{color:#fff;font-size:1.1rem;font-weight:700}
.email-btn{width:100%;padding:10px;border-radius:30px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#ccccee;font-size:0.85rem;cursor:pointer;margin-top:16px}
.email-btn:hover{background:rgba(255,255,255,0.1)}
.email-list{margin-top:12px;display:none}
.email-row{display:flex;justify-content:space-between;padding:6px 0;font-size:0.8rem;border-bottom:1px solid rgba(255,255,255,0.03)}
.email-row .name{color:#ddd}
.email-row .addr{color:#8888cc}
.password-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:999}
.password-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:30px;max-width:320px;width:90%}
.password-box input{width:100%;padding:10px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:1rem;text-align:center;outline:none;margin:12px 0}
.password-box button{width:100%;padding:10px;border-radius:30px;border:none;background:linear-gradient(135deg,#6633cc,#aa44ff);color:#fff;font-size:0.9rem;font-weight:700;cursor:pointer}
.loading{text-align:center;color:#666688;font-size:0.9rem;padding:20px}
</style>
</head>
<body>
<h1>🎯 Whack-A-Pol</h1>
<div class="sub">Player Data Dashboard</div>

<div class="card">
  <div class="stat-row"><span class="stat-label">👤 Total Players</span><span class="stat-value" id="statTotal">—</span></div>
  <div class="stat-row"><span class="stat-label">🏆 Leaderboard Entries</span><span class="stat-value" id="statLB">—</span></div>
  <div class="stat-row"><span class="stat-label">📧 Emails Collected</span><span class="stat-value" id="statEmail">—</span></div>
  <div class="stat-row" style="border:none"><span class="stat-label">💌 Export for Happy</span><span class="stat-value"><button onclick="copyExport()" style="background:none;border:1px solid rgba(255,255,255,0.1);color:#8888cc;padding:4px 12px;border-radius:12px;cursor:pointer;font-size:0.75rem">📋 Copy CSV</button></span></div>
</div>

<div class="card">
  <button class="email-btn" onclick="showEmailList()">📧 Show Email List</button>
  <div id="emailListContainer" class="email-list"></div>
</div>

<div id="passwordOverlay" class="password-overlay">
  <div class="password-box">
    <div style="font-size:1.1rem;font-weight:700;text-align:center">🔒 Admin Access</div>
    <div style="font-size:0.75rem;color:#666688;text-align:center;margin-top:4px">Enter password to view emails</div>
    <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Unlock</button>
    <div id="pwError" style="text-align:center;color:#ff6666;font-size:0.75rem;margin-top:8px;display:none">Wrong password</div>
  </div>
</div>

<script>
var SB_URL = 'https://pdizakwmdtvprrswabzq.supabase.co';
var SB_KEY = 'sb_publishable_DZdlfKzPizmHuG9g0JFY-w_KMX9oupf';
var ADMIN_PW = 'rockinapps';
var emailData = [];

function sbFetch(path){
  return fetch(SB_URL + path, {
    headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY}
  }).then(function(r){ return r.json(); });
}

function loadStats(){
  Promise.all([
    sbFetch('/rest/v1/leaderboard?select=count'),
    sbFetch('/rest/v1/leaderboard?and=(score.gt.0)&select=count'),
    sbFetch('/rest/v1/leaderboard?and=(email.not.is.null)&select=count')
  ]).then(function(results){
    document.getElementById('statTotal').textContent = results[0][0]?.count || 0;
    document.getElementById('statLB').textContent = results[1][0]?.count || 0;
    document.getElementById('statEmail').textContent = results[2][0]?.count || 0;
  });
}

function checkPw(){
  var pw = document.getElementById('pwInput').value;
  if(pw === ADMIN_PW){
    document.getElementById('passwordOverlay').style.display = 'none';
    loadEmailData();
  } else {
    document.getElementById('pwError').style.display = 'block';
  }
}

function loadEmailData(){
  var container = document.getElementById('emailListContainer');
  container.innerHTML = '<div class="loading">Loading emails...</div>';
  sbFetch('/rest/v1/leaderboard?select=nickname,email,score,whacks,loyalty,party&order=score.desc').then(function(rows){
    emailData = rows.filter(function(r){ return r.email; });
    if(emailData.length === 0){
      container.innerHTML = '<div style="text-align:center;color:#666688;font-size:0.85rem;padding:20px">No emails collected yet</div>';
      return;
    }
    var h = '';
    h += '<div class="email-row" style="font-weight:700;color:#9999bb;font-size:0.75rem;border-bottom:2px solid rgba(255,255,255,0.1)">';
    h += '<span>Player</span><span>Score</span><span style="text-align:right">Email</span>';
    h += '</div>';
    emailData.forEach(function(e){
      var dot = e.party === 'R' ? '<span style="color:#ff4444">●</span>' : e.party === 'D' ? '<span style="color:#4488ff">●</span>' : '<span style="color:#555">●</span>';
      h += '<div class="email-row">';
      h += '<span class="name">'+dot+' '+e.nickname+'</span>';
      h += '<span style="color:#9999bb">'+e.score+'pts</span>';
      h += '<span class="addr">'+e.email+'</span>';
      h += '</div>';
    });
    h += '<div style="text-align:center;font-size:0.7rem;color:#555577;margin-top:10px">'+emailData.length+' total</div>';
    container.innerHTML = h;
    container.style.display = 'block';
  });
}

function showEmailList(){
  document.getElementById('passwordOverlay').style.display = 'flex';
  document.getElementById('pwInput').value = '';
  document.getElementById('pwInput').focus();
  document.getElementById('pwError').style.display = 'none';
}

function copyExport(){
  if(emailData.length === 0){
    loadEmailData();
    setTimeout(function(){
      if(emailData.length === 0) return;
      doCopyCSV();
    }, 1000);
    return;
  }
  doCopyCSV();
}

function doCopyCSV(){
  if(emailData.length === 0){ alert('No emails to export'); return; }
  var csv = 'nickname,email,score,whacks,loyalty,party\n';
  emailData.forEach(function(e){
    csv += '"' + e.nickname + '","' + e.email + '",' + e.score + ',' + e.whacks + ',' + e.loyalty + ',"' + e.party + '"\n';
  });
  navigator.clipboard.writeText(csv).then(function(){
    alert('Copied ' + emailData.length + ' emails to clipboard (CSV format)');
  }).catch(function(){
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = csv;
    document.body.appendChild(ta);
    ta.select();
    ta.remove();
    alert('Copied ' + emailData.length + ' emails');
  });
}

loadStats();
</script>
</body>
</html>
