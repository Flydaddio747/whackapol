<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Whack-a-Pol QR Code</title>
<style>
body{background:#0a0a1a;color:#e0e0ff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center}
h1{font-size:1.5rem;margin-bottom:4px}
.sub{color:#666688;font-size:0.85rem;margin-bottom:20px}
.qr-box{background:white;padding:20px;border-radius:20px;display:inline-block}
.qr-box img{width:280px;height:280px;display:block}
.url{font-size:0.9rem;color:#a855f7;margin-top:16px}
.instructions{font-size:0.8rem;color:#666688;margin-top:16px;line-height:1.5}
</style></head><body>
<h1>🎯 Whack-a-Pol</h1>
<p class="sub">Scan to play instantly</p>
<div class="qr-box">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=350x350&data=https://www.rockinapps.com/whackapol/" alt="QR Code for Whack-a-Pol">
</div>
<div class="url">https://www.rockinapps.com/whackapol/</div>
<p class="instructions">
📱 Open camera → point at QR code → tap banner<br>
⭐ Or save to Home Screen for one-tap access
</p>
</body></html>
